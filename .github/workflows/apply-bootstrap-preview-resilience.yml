name: Apply bootstrap preview resilience patch

on:
  push:
    branches:
      - agent/bootstrap-preview-resilience
    paths:
      - .github/workflows/apply-bootstrap-preview-resilience.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out resilience branch
        uses: actions/checkout@v4
        with:
          ref: agent/bootstrap-preview-resilience

      - name: Patch preview preparation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/main.py")
          text = path.read_text(encoding="utf-8")

          import_marker = "from app.bootstrap_normalizer import normalize_bootstrap_json\n"
          import_replacement = (
              "from app.bootstrap_content_repair import repair_bootstrap_content\n"
              "from app.bootstrap_normalizer import normalize_bootstrap_json\n"
          )
          if "from app.bootstrap_content_repair import repair_bootstrap_content" not in text:
              if text.count(import_marker) != 1:
                  raise SystemExit("Could not locate bootstrap normalizer import")
              text = text.replace(import_marker, import_replacement, 1)

          function_marker = "def _prepare_bootstrap_preview_payload(bootstrap_json: dict[str, Any]) -> dict[str, Any]:\n    normalized_bootstrap = normalize_bootstrap_json(bootstrap_json)\n    errors = validate_bootstrap_result(normalized_bootstrap)\n"
          function_replacement = "def _prepare_bootstrap_preview_payload(bootstrap_json: dict[str, Any]) -> dict[str, Any]:\n    normalized_bootstrap = normalize_bootstrap_json(bootstrap_json)\n    repair_bootstrap_content(normalized_bootstrap)\n    errors = validate_bootstrap_result(normalized_bootstrap)\n"
          if "repair_bootstrap_content(normalized_bootstrap)" not in text:
              if text.count(function_marker) != 1:
                  raise SystemExit("Could not locate bootstrap preview preparation block")
              text = text.replace(function_marker, function_replacement, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit production patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/main.py
          if git diff --cached --quiet; then
            echo "Patch already applied."
          else
            git commit -m "Repair recoverable bootstrap preview content"
            git push origin HEAD:agent/bootstrap-preview-resilience
          fi
