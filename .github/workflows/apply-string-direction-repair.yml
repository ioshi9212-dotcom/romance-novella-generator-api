name: Apply string direction repair

on:
  push:
    branches:
      - agent/repair-string-relationship-directions
    paths:
      - .github/workflows/apply-string-direction-repair.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-string-direction-repair.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/repair-string-relationship-directions
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Patch validation and add regression
        run: |
          python - <<'PY'
          from pathlib import Path

          validators = Path('app/validators.py')
          text = validators.read_text(encoding='utf-8')
          import_line = 'from app.directional_relationships import prepare_directional_relationships\n'
          if import_line not in text:
              marker = 'from app.id_utils import pair_id'
              pos = text.find(marker)
              if pos < 0:
                  raise SystemExit('pair_id import not found')
              text = text[:pos] + import_line + text[pos:]

          helper_name = 'def _repair_string_relationship_directions'
          if helper_name not in text:
              func_marker = 'def validate_bootstrap_result(data: dict[str, Any]) -> list[str]:'
              pos = text.find(func_marker)
              if pos < 0:
                  raise SystemExit('validate_bootstrap_result not found')
              helper = '''def _repair_string_relationship_directions(data: dict[str, Any]) -> None:\n    relationships = data.get("relationships") if isinstance(data.get("relationships"), dict) else {}\n    preserved_views: list[tuple[str, str, str]] = []\n    for pair_key, relationship in relationships.items():\n        if not isinstance(relationship, dict):\n            continue\n        for direction_key in ("a_to_b", "b_to_a"):\n            value = relationship.get(direction_key)\n            if isinstance(value, str) and value.strip():\n                preserved_views.append((str(pair_key), direction_key, value.strip()))\n\n    prepare_directional_relationships(data)\n\n    repaired = data.get("relationships") if isinstance(data.get("relationships"), dict) else {}\n    for pair_key, direction_key, view_text in preserved_views:\n        relationship = repaired.get(pair_key)\n        direction = relationship.get(direction_key) if isinstance(relationship, dict) else None\n        if isinstance(direction, dict):\n            direction["current_view"] = view_text\n\n\n'''
              text = text[:pos] + helper + text[pos:]

          call_line = '    _repair_string_relationship_directions(data)\n'
          if call_line not in text:
              func_pos = text.find('def validate_bootstrap_result(data: dict[str, Any]) -> list[str]:')
              cast_pos = text.find('    prepare_bootstrap_cast(data)\n', func_pos)
              if cast_pos < 0:
                  raise SystemExit('prepare_bootstrap_cast call not found')
              insert_at = cast_pos + len('    prepare_bootstrap_cast(data)\n')
              text = text[:insert_at] + call_line + text[insert_at:]
          validators.write_text(text, encoding='utf-8')

          directions = Path('app/directional_relationships.py')
          text = directions.read_text(encoding='utf-8')
          rule = '- a_to_b и b_to_a всегда объекты, не строки; русский текст помещай внутрь current_view и других полей.\n'
          if rule not in text:
              marker = '- Каждое направление:'
              start = text.find(marker)
              if start < 0:
                  raise SystemExit('direction rule marker not found')
              end = text.find('\n', start)
              text = text[:end + 1] + rule + text[end + 1:]
          directions.write_text(text, encoding='utf-8')

          test_path = Path('tests/test_string_relationship_direction_repair.py')
          test_path.write_text('''from app.validators import validate_bootstrap_result\n\n\ndef test_string_relationship_directions_are_repaired_and_russian_text_is_preserved():\n    data = {\n        "protagonist": {"id": "lina_hart", "name": "Lina Hart", "role": "player_character"},\n        "characters": {\n            "lina_hart": {\n                "id": "lina_hart", "name": "Lina Hart", "role": "player_character",\n                "cast_status": "player", "introduced": True, "known_to_player": True,\n                "show_in_preview": True, "available_to_scene": True,\n            },\n            "mason_lee": {\n                "id": "mason_lee", "name": "Mason Lee", "role": "close friend",\n                "cast_status": "known_core", "introduced": True, "known_to_player": True,\n                "show_in_preview": True, "available_to_scene": True,\n            },\n        },\n        "relationships": {\n            "lina_hart__mason_lee": {\n                "pair_id": "lina_hart__mason_lee",\n                "character_a": "lina_hart",\n                "character_b": "mason_lee",\n                "a_to_b": "ценит",\n                "b_to_a": "влюблён",\n            }\n        },\n        "knowledge": {},\n        "story_plan": {},\n        "current_state": {"player_character_id": "lina_hart"},\n    }\n\n    errors = validate_bootstrap_result(data)\n    relationship = data["relationships"]["lina_hart__mason_lee"]\n\n    assert isinstance(relationship["a_to_b"], dict)\n    assert isinstance(relationship["b_to_a"], dict)\n    assert relationship["a_to_b"]["current_view"] == "ценит"\n    assert relationship["b_to_a"]["current_view"] == "влюблён"\n    assert relationship["a_to_b"]["scores"]\n    assert relationship["b_to_a"]["scores"]\n    assert not any("a_to_b" in error and "not of type 'object'" in error for error in errors)\n    assert not any("b_to_a" in error and "not of type 'object'" in error for error in errors)\n''', encoding='utf-8')
          PY
      - name: Install test dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1
      - name: Run tests
        env:
          DATA_DIR: /tmp/novella-data
          PYTHONDONTWRITEBYTECODE: 1
          PYTHONUNBUFFERED: 1
        run: python -m pytest -q
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/validators.py app/directional_relationships.py tests/test_string_relationship_direction_repair.py
          git commit -m "Repair string relationship directions before validation"
          git push origin HEAD:agent/repair-string-relationship-directions
