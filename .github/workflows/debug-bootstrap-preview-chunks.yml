name: Apply bootstrap preview Action schema integration

on:
  push:
    branches:
      - agent/chunk-bootstrap-preview-response
    paths:
      - .github/workflows/debug-bootstrap-preview-chunks.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chunk-bootstrap-preview-response
          fetch-depth: 0
      - name: Apply guarded Action schema patch
        run: python scripts/apply_bootstrap_preview_openapi_patch.py
      - name: Commit clean integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Expose bootstrap preview chunks to Custom GPT Actions"
          git push origin HEAD:agent/chunk-bootstrap-preview-response
