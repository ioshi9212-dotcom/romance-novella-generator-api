name: Apply bootstrap preview chunks OpenAPI patch

on:
  push:
    branches:
      - agent/bootstrap-preview-chunks
    paths:
      - .github/workflows/apply-bootstrap-preview-chunks-openapi.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out preview chunk branch
        uses: actions/checkout@v4
        with:
          ref: agent/bootstrap-preview-chunks
          fetch-depth: 0

      - name: Apply Actions OpenAPI patch
        run: python scripts/apply_bootstrap_preview_chunks_openapi_patch.py

      - name: Remove temporary patch machinery
        run: |
          rm .github/workflows/apply-bootstrap-preview-chunks-openapi.yml
          rm scripts/apply_bootstrap_preview_chunks_openapi_patch.py

      - name: Commit patched schema builder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/novella_openapi_actions.py .github/workflows/apply-bootstrap-preview-chunks-openapi.yml scripts/apply_bootstrap_preview_chunks_openapi_patch.py
          git commit -m "Expose bootstrap preview chunks to Actions"
          git push origin agent/bootstrap-preview-chunks
