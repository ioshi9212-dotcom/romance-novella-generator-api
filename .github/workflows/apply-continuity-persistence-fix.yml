name: Apply continuity persistence fix

on:
  push:
    branches:
      - agent/full-turn-persistence-audit
    paths:
      - .github/workflows/apply-continuity-persistence-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v4
        with:
          ref: agent/full-turn-persistence-audit

      - name: Patch StateUpdater continuity source
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/state_updater.py")
          text = path.read_text(encoding="utf-8")
          old = '        continuity = bundle.get("continuity", {}) or {}\n'
          new = '        # read_session_bundle intentionally compacts continuity for Action payloads;\n        # state writes must start from the complete persisted document or maintenance\n        # reports and older memory metadata disappear on the next ordinary turn.\n        continuity = self.storage.read_json(session_id, "continuity.json", default={}) or {}\n'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one continuity assignment, found {count}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Commit focused fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/state_updater.py
          git commit -m "Preserve full continuity during turn updates"
          git push origin HEAD:agent/full-turn-persistence-audit
