name: Apply bootstrap source fidelity

on:
  push:
    branches:
      - agent/enforce-bootstrap-source-fidelity
    paths:
      - .github/workflows/apply-bootstrap-source-fidelity.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-bootstrap-source-fidelity.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    env:
      DATA_DIR: /tmp/novella-data
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/enforce-bootstrap-source-fidelity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Patch preview validation and bootstrap instructions
        run: |
          python - <<'PY'
          from pathlib import Path

          main_path = Path('app/main.py')
          main = main_path.read_text(encoding='utf-8')

          import_anchor = 'from app.bootstrap_staging import BootstrapStageError, assemble_staged_bootstrap, save_bootstrap_part as save_staged_bootstrap_part\n'
          import_line = 'from app.bootstrap_source_fidelity import validate_bootstrap_source_fidelity\n'
          if import_line not in main:
              if import_anchor not in main:
                  raise SystemExit('main import anchor missing')
              main = main.replace(import_anchor, import_anchor + import_line, 1)

          old_prepare = '''def _prepare_bootstrap_preview_payload(bootstrap_json: dict[str, Any]) -> dict[str, Any]:
              normalized_bootstrap = normalize_bootstrap_json(bootstrap_json)
              repair_bootstrap_content(normalized_bootstrap)
              errors = validate_bootstrap_result(normalized_bootstrap)
              prepare_directional_relationships(normalized_bootstrap)
              prepare_director_bible(normalized_bootstrap)
              errors.extend(validate_directional_relationships(normalized_bootstrap))
              errors.extend(validate_director_bible(normalized_bootstrap))
              if errors:
                  raise HTTPException(status_code=422, detail=errors)
              return normalized_bootstrap
          '''.replace('          ', '')
          new_prepare = '''def _prepare_bootstrap_preview_payload(
              bootstrap_json: dict[str, Any],
              *,
              user_request: dict[str, Any] | None = None,
          ) -> dict[str, Any]:
              normalized_bootstrap = normalize_bootstrap_json(bootstrap_json)
              repair_bootstrap_content(normalized_bootstrap)
              errors = validate_bootstrap_result(normalized_bootstrap)
              prepare_directional_relationships(normalized_bootstrap)
              prepare_director_bible(normalized_bootstrap)
              errors.extend(validate_directional_relationships(normalized_bootstrap))
              errors.extend(validate_director_bible(normalized_bootstrap))
              errors.extend(validate_bootstrap_source_fidelity(normalized_bootstrap, user_request))
              if errors:
                  raise HTTPException(status_code=422, detail=errors)
              return normalized_bootstrap
          '''.replace('          ', '')
          if old_prepare in main:
              main = main.replace(old_prepare, new_prepare, 1)
          elif 'validate_bootstrap_source_fidelity(normalized_bootstrap, user_request)' not in main:
              raise SystemExit('prepare function anchor missing')

          old_create = '''def create_bootstrap_preview(session_id: str, request: BootstrapPreviewRequest) -> dict:
              normalized_bootstrap = _prepare_bootstrap_preview_payload(request.bootstrap_json)
              manager = SessionManager()
              try:
                  with _session_request_context(manager, session_id):
                      return manager.save_bootstrap_preview(session_id, normalized_bootstrap)
              except FileNotFoundError as exc:
                  raise HTTPException(status_code=404, detail=str(exc))
              except ValueError as exc:
                  raise HTTPException(status_code=409, detail=str(exc))
          '''.replace('          ', '')
          new_create = '''def create_bootstrap_preview(session_id: str, request: BootstrapPreviewRequest) -> dict:
              manager = SessionManager()
              try:
                  with _session_request_context(manager, session_id):
                      user_request = manager.storage.read_json(session_id, "user_request.json", default={})
                      normalized_bootstrap = _prepare_bootstrap_preview_payload(
                          request.bootstrap_json,
                          user_request=user_request if isinstance(user_request, dict) else {},
                      )
                      return manager.save_bootstrap_preview(session_id, normalized_bootstrap)
              except FileNotFoundError as exc:
                  raise HTTPException(status_code=404, detail=str(exc))
              except ValueError as exc:
                  raise HTTPException(status_code=409, detail=str(exc))
          '''.replace('          ', '')
          if old_create in main:
              main = main.replace(old_create, new_create, 1)
          elif 'user_request=user_request if isinstance(user_request, dict) else {}' not in main:
              raise SystemExit('create preview route anchor missing')

          old_finalize = '''            staged_bootstrap, progress = assemble_staged_bootstrap(manager, session_id)
              normalized_bootstrap = _prepare_bootstrap_preview_payload(staged_bootstrap)
              response = manager.save_bootstrap_preview(session_id, normalized_bootstrap)
          '''.replace('          ', '')
          new_finalize = '''            staged_bootstrap, progress = assemble_staged_bootstrap(manager, session_id)
              user_request = manager.storage.read_json(session_id, "user_request.json", default={})
              normalized_bootstrap = _prepare_bootstrap_preview_payload(
                  staged_bootstrap,
                  user_request=user_request if isinstance(user_request, dict) else {},
              )
              response = manager.save_bootstrap_preview(session_id, normalized_bootstrap)
          '''.replace('          ', '')
          if old_finalize in main:
              main = main.replace(old_finalize, new_finalize, 1)
          elif 'staged_bootstrap,\n                user_request=user_request' not in main:
              raise SystemExit('finalize route anchor missing')

          main_path.write_text(main, encoding='utf-8')

          setup_path = Path('app/bootstrap_setup.py')
          setup = setup_path.read_text(encoding='utf-8')
          prompt_anchor = '- Всё, чего пользователь не указал, придумай сам логично из жанра, роли, прошлого и стартовой ситуации.\n'
          prompt_lines = (
              '- Перед finalize сверь результат с запросом: каждый явно описанный знакомый и будущий значимый персонаж должен иметь полную карточку.\n'
              '- Если finalize вернул source_fidelity, исправь перечисленные части через saveBootstrapPart и повтори finalize; неполный preview пользователю не показывай.\n'
          )
          if 'Если finalize вернул source_fidelity' not in setup:
              if prompt_anchor not in setup:
                  raise SystemExit('bootstrap prompt anchor missing')
              setup = setup.replace(prompt_anchor, prompt_anchor + prompt_lines, 1)
          setup_path.write_text(setup, encoding='utf-8')
          PY
      - name: Install test dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1
      - name: Run tests
        run: python -m pytest -q
      - name: Commit production changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/main.py app/bootstrap_setup.py
          git commit -m "Enforce bootstrap fidelity to source request"
          git push origin HEAD:agent/enforce-bootstrap-source-fidelity
