name: Apply bootstrap Action kwargs fix

on:
  push:
    branches:
      - agent/fix-bootstrap-action-kwargs
    paths:
      - scripts/apply_bootstrap_action_kwargs_fix.py
      - .github/workflows/apply-bootstrap-action-kwargs-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-bootstrap-action-kwargs
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply patch
        run: python scripts/apply_bootstrap_action_kwargs_fix.py
      - name: Commit patched contract
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden bootstrap Action argument shapes"
          git push origin HEAD:agent/fix-bootstrap-action-kwargs
