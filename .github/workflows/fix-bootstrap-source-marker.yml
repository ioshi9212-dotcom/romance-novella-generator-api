name: Fix bootstrap source marker

on:
  push:
    branches:
      - agent/enforce-bootstrap-source-fidelity
    paths:
      - .github/workflows/fix-bootstrap-source-marker.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-bootstrap-source-marker.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/enforce-bootstrap-source-fidelity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Repair source markers and empty-source behavior
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app/bootstrap_source_fidelity.py')
          text = path.read_text(encoding='utf-8')

          old_marker = '"source_markers": ("старший брат", "старшего брата"),'
          new_marker = '"source_markers": ("старший брат", "старшего брата", "старшим брат"),'
          if old_marker in text:
              text = text.replace(old_marker, new_marker, 1)
          elif new_marker not in text:
              raise SystemExit('brother marker anchor missing')

          source_anchor = '    source = _flatten_text(user_request or {})\n    errors: list[str] = []\n'
          source_replacement = (
              '    source = _flatten_text(user_request or {})\n'
              '    if not source:\n'
              '        return []\n'
              '    errors: list[str] = []\n'
          )
          if '    if not source:\n        return []\n' not in text:
              if source_anchor not in text:
                  raise SystemExit('empty source anchor missing')
              text = text.replace(source_anchor, source_replacement, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Install test dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1
      - name: Run fidelity tests
        run: python -m pytest tests/test_bootstrap_source_fidelity.py -q
      - name: Commit source fidelity fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/bootstrap_source_fidelity.py
          git commit -m "Skip source fidelity checks without source text"
          git push origin HEAD:agent/enforce-bootstrap-source-fidelity
