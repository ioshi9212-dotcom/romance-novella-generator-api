name: Fix bootstrap source marker

on:
  push:
    branches:
      - agent/enforce-bootstrap-source-fidelity
    paths:
      - .github/workflows/fix-bootstrap-source-marker.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-bootstrap-source-marker.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/enforce-bootstrap-source-fidelity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Add inflected brother marker
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app/bootstrap_source_fidelity.py')
          text = path.read_text(encoding='utf-8')
          old = '"source_markers": ("старший брат", "старшего брата"),'
          new = '"source_markers": ("старший брат", "старшего брата", "старшим брат"),'
          if old not in text and new not in text:
              raise SystemExit('brother marker anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Install test dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1
      - name: Run focused tests
        run: python -m pytest tests/test_bootstrap_source_fidelity.py -q
      - name: Commit marker fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/bootstrap_source_fidelity.py
          git commit -m "Recognize inflected older brother source marker"
          git push origin HEAD:agent/enforce-bootstrap-source-fidelity
