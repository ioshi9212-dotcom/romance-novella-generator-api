name: Update bootstrap preview contract test

on:
  push:
    branches:
      - agent/fix-bootstrap-action-kwargs
    paths:
      - scripts/update_bootstrap_preview_contract_test.py
      - .github/workflows/update-bootstrap-preview-contract-test.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-bootstrap-action-kwargs
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Update test
        run: python scripts/update_bootstrap_preview_contract_test.py
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update bootstrap Action contract expectation"
          git push origin HEAD:agent/fix-bootstrap-action-kwargs
