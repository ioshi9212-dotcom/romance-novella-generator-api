name: Debug bootstrap source fidelity

on:
  push:
    branches:
      - agent/enforce-bootstrap-source-fidelity
    paths:
      - .github/workflows/debug-bootstrap-source-fidelity.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/debug-bootstrap-source-fidelity.yml

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      DATA_DIR: /tmp/novella-data
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/enforce-bootstrap-source-fidelity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1
      - name: Capture full test output
        run: |
          set +e
          python -m pytest -q --maxfail=10 > ci-bootstrap-source-fidelity-full.txt 2>&1
          code=$?
          echo "" >> ci-bootstrap-source-fidelity-full.txt
          echo "PYTEST_EXIT_CODE=$code" >> ci-bootstrap-source-fidelity-full.txt
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-bootstrap-source-fidelity-full.txt
          git commit -m "Capture full bootstrap fidelity failures"
          git push origin HEAD:agent/enforce-bootstrap-source-fidelity
