name: Debug bootstrap source fidelity

on:
  push:
    branches:
      - agent/enforce-bootstrap-source-fidelity
    paths:
      - .github/workflows/debug-bootstrap-source-fidelity.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/debug-bootstrap-source-fidelity.yml

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      DATA_DIR: /tmp/novella-data
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/enforce-bootstrap-source-fidelity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply integration in worktree
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('app/main.py')
          text = path.read_text(encoding='utf-8')
          anchor = 'from app.bootstrap_staging import BootstrapStageError, assemble_staged_bootstrap, save_bootstrap_part as save_staged_bootstrap_part\n'
          line = 'from app.bootstrap_source_fidelity import validate_bootstrap_source_fidelity\n'
          if line not in text:
              text = text.replace(anchor, anchor + line, 1)

          if 'validate_bootstrap_source_fidelity(normalized_bootstrap, user_request)' not in text:
              replacement = '''def _prepare_bootstrap_preview_payload(
              bootstrap_json: dict[str, Any],
              *,
              user_request: dict[str, Any] | None = None,
          ) -> dict[str, Any]:
              normalized_bootstrap = normalize_bootstrap_json(bootstrap_json)
              repair_bootstrap_content(normalized_bootstrap)
              errors = validate_bootstrap_result(normalized_bootstrap)
              prepare_directional_relationships(normalized_bootstrap)
              prepare_director_bible(normalized_bootstrap)
              errors.extend(validate_directional_relationships(normalized_bootstrap))
              errors.extend(validate_director_bible(normalized_bootstrap))
              errors.extend(validate_bootstrap_source_fidelity(normalized_bootstrap, user_request))
              if errors:
                  raise HTTPException(status_code=422, detail=errors)
              return normalized_bootstrap
          '''
              pattern = re.compile(
                  r'def _prepare_bootstrap_preview_payload\(bootstrap_json: dict\[str, Any\]\) -> dict\[str, Any\]:\n'
                  r'(?:    .*\n)+?'
                  r'    return normalized_bootstrap\n'
              )
              text, count = pattern.subn(replacement, text, count=1)
              if count != 1:
                  raise SystemExit(f'prepare replacement count={count}')

          if 'request.bootstrap_json,\n                user_request=user_request if isinstance(user_request, dict) else {}' not in text:
              replacement = '''def create_bootstrap_preview(session_id: str, request: BootstrapPreviewRequest) -> dict:
              manager = SessionManager()
              try:
                  with _session_request_context(manager, session_id):
                      user_request = manager.storage.read_json(session_id, "user_request.json", default={})
                      normalized_bootstrap = _prepare_bootstrap_preview_payload(
                          request.bootstrap_json,
                          user_request=user_request if isinstance(user_request, dict) else {},
                      )
                      return manager.save_bootstrap_preview(session_id, normalized_bootstrap)
              except FileNotFoundError as exc:
                  raise HTTPException(status_code=404, detail=str(exc))
              except ValueError as exc:
                  raise HTTPException(status_code=409, detail=str(exc))
          '''
              pattern = re.compile(
                  r'def create_bootstrap_preview\(session_id: str, request: BootstrapPreviewRequest\) -> dict:\n'
                  r'(?:    .*\n|\n)+?'
                  r'(?=@app\.get\()'
              )
              text, count = pattern.subn(replacement + '\n\n', text, count=1)
              if count != 1:
                  raise SystemExit(f'route replacement count={count}')

          old = (
              '            staged_bootstrap, progress = assemble_staged_bootstrap(manager, session_id)\n'
              '            normalized_bootstrap = _prepare_bootstrap_preview_payload(staged_bootstrap)\n'
          )
          new = (
              '            staged_bootstrap, progress = assemble_staged_bootstrap(manager, session_id)\n'
              '            user_request = manager.storage.read_json(session_id, "user_request.json", default={})\n'
              '            normalized_bootstrap = _prepare_bootstrap_preview_payload(\n'
              '                staged_bootstrap,\n'
              '                user_request=user_request if isinstance(user_request, dict) else {},\n'
              '            )\n'
          )
          if old in text:
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Install test dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1
      - name: Capture integrated test output
        run: |
          set +e
          python -m pytest -q --maxfail=10 > ci-bootstrap-source-fidelity-integrated.txt 2>&1
          code=$?
          echo "" >> ci-bootstrap-source-fidelity-integrated.txt
          echo "PYTEST_EXIT_CODE=$code" >> ci-bootstrap-source-fidelity-integrated.txt
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-bootstrap-source-fidelity-integrated.txt
          git commit -m "Capture integrated bootstrap fidelity failures"
          git push origin HEAD:agent/enforce-bootstrap-source-fidelity
