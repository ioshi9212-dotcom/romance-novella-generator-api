name: Apply bootstrap preview chunk integration

on:
  push:
    branches:
      - agent/chunk-bootstrap-preview-response
    paths:
      - .github/workflows/apply-bootstrap-preview-chunks.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out chunk branch
        uses: actions/checkout@v4
        with:
          ref: agent/chunk-bootstrap-preview-response
          fetch-depth: 0

      - name: Apply guarded patch
        run: python scripts/apply_bootstrap_preview_chunks_patch.py

      - name: Commit integrated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Integrate chunked bootstrap preview transport"
          git push origin HEAD:agent/chunk-bootstrap-preview-response
