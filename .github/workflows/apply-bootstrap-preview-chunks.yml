name: Apply bootstrap preview chunks patch

on:
  push:
    branches:
      - agent/bootstrap-preview-chunks
    paths:
      - .github/workflows/apply-bootstrap-preview-chunks.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out preview chunk branch
        uses: actions/checkout@v4
        with:
          ref: agent/bootstrap-preview-chunks
          fetch-depth: 0

      - name: Apply deterministic patch
        run: python scripts/apply_bootstrap_preview_chunks_patch.py

      - name: Remove temporary patch machinery
        run: |
          rm .github/workflows/apply-bootstrap-preview-chunks.yml
          rm scripts/apply_bootstrap_preview_chunks_patch.py

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/main.py app/models.py app/bootstrap_preview_transport.py tests/test_bootstrap_preview_chunks.py .github/workflows/apply-bootstrap-preview-chunks.yml scripts/apply_bootstrap_preview_chunks_patch.py
          git commit -m "Chunk long bootstrap preview responses"
          git push origin agent/bootstrap-preview-chunks
