name: Tests

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATA_DIR: /tmp/novella-data
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply exact time skip patch
        id: patch
        continue-on-error: true
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_time_skip_patch.py')
          text = path.read_text(encoding='utf-8')
          old = '''    "- `proposed_updates` всегда содержит объекты/массивы по schema; пустые обновления не выдумывай.\\n",
              "- `proposed_updates` всегда содержит объекты/массивы по schema; пустые обновления не выдумывай. Для `advanceTime` дополнительно обязателен `time_skip_result`.\\n",'''
          new = '''    "- `proposed_updates` всегда содержит `scene_state_patch`, `continuity_patch`, `relationship_patches`, `knowledge_patches`, `npc_state_patches`, `director_bible_patches`, `new_or_updated_characters`;\\n",
              "- `proposed_updates` всегда содержит `scene_state_patch`, `continuity_patch`, `relationship_patches`, `knowledge_patches`, `npc_state_patches`, `director_bible_patches`, `new_or_updated_characters`; для `advanceTime` дополнительно обязателен `time_skip_result`;\\n",'''
          if old not in text:
              raise SystemExit('temporary repair anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python scripts/apply_time_skip_patch.py > patch-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: time-skip-patch-output
          path: patch-output.txt

      - name: Commit applied patch
        if: steps.patch.outputs.exit_code == '0'
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
            git add app gpt prompts rules schemas tests
            git commit -m "Wire guarded time skip flow"
            git push origin HEAD:agent/time-skip-event-flow
          fi

      - name: Fail on patch error
        if: steps.patch.outputs.exit_code != '0'
        run: exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1

      - name: Run tests
        run: python -m pytest -q
