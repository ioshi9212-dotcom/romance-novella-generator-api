name: Tests

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATA_DIR: /tmp/novella-data
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply staged bootstrap integration
        run: |
          python scripts/apply_staged_bootstrap_preview.py
          sed -i 's/полной скрытой карточкой/скрытая полная карточка/' tests/test_openapi_actions_contract.py
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
            git add app gpt tests/test_openapi_actions_contract.py
            git commit -m "Synchronize staged bootstrap instruction tests"
            git push origin HEAD:agent/staged-bootstrap-preview
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1

      - name: Run tests
        run: python -m pytest -q
