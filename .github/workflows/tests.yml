name: Tests

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATA_DIR: /tmp/novella-data
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fix romantic role classifier
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("app/relationship_state.py")
          text = path.read_text(encoding="utf-8")
          old = '("love", "romance", "boyfriend", "girlfriend", "partner", "crush", "lover", "парень", "девуш", "быв", "влюб")'
          new = '("love", "romance", "romantic", "boyfriend", "girlfriend", "partner", "crush", "lover", "парень", "девуш", "быв", "влюб")'
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          elif new not in text:
              raise SystemExit("romance role tuple not found")
          PY
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app/relationship_state.py
            git commit -m "Recognize romantic role labels"
            git push origin HEAD:agent/directed-relationships
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1

      - name: Run tests
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee pytest-output.txt

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: directed-relationships-pytest
          path: pytest-output.txt
          retention-days: 1
