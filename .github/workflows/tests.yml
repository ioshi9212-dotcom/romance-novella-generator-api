name: Tests

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATA_DIR: /tmp/novella-data
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1

      - name: Run tests and capture diagnostics
        id: pytest_run
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short > pytest-output.txt 2>&1
          exit_code=$?
          cat pytest-output.txt
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
          if-no-files-found: error
          retention-days: 1

      - name: Fail when pytest failed
        if: always()
        run: exit "${{ steps.pytest_run.outputs.exit_code }}"
