name: Tests

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATA_DIR: /tmp/novella-data
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply focused bootstrap compatibility repair
        if: github.head_ref == 'agent/full-turn-persistence-audit' || github.ref_name == 'agent/full-turn-persistence-audit'
        run: |
          python scripts/apply_bootstrap_compat_patch.py
          if git diff --quiet -- app/character_profiles.py; then
            echo "No source patch required."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app/character_profiles.py
            git commit -m "Repair bootstrap schema compatibility fields"
            git push origin HEAD:agent/full-turn-persistence-audit
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.28.1

      - name: Run tests
        run: python -m pytest -q
