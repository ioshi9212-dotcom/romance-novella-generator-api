openapi: 3.1.0
info:
  title: Romance Novella Generator API
  version: gpt-actions-v5
  description: Railway API used by a Custom GPT as memory, context builder, validator, and state storage for generated novella sessions.
servers:
  - url: https://YOUR-RAILWAY-DOMAIN.up.railway.app
    description: Replace with your Railway public domain.
paths:
  /health:
    get:
      operationId: health
      summary: Check API health.
      responses:
        '200':
          description: API health response.
          content:
            application/json:
              schema:
                type: object
  /api/v1/start-questionnaire:
    get:
      operationId: getStartQuestionnaire
      summary: Return the short start questionnaire when the user gives too little story setup.
      responses:
        '200':
          description: Questionnaire text.
          content:
            application/json:
              schema:
                type: object
                properties:
                  questionnaire:
                    type: string
  /api/v1/sessions:
    post:
      operationId: createSession
      summary: Create a new novella session or return a questionnaire if the request is too empty.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: New session, pending bootstrap prompt, debug session, or questionnaire.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
    get:
      operationId: listSessions
      summary: List saved session IDs.
      responses:
        '200':
          description: Session list.
          content:
            application/json:
              schema:
                type: object
  /api/v1/sessions/{session_id}:
    get:
      operationId: getSession
      summary: Get basic session metadata.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session metadata.
          content:
            application/json:
              schema:
                type: object
  /api/v1/sessions/{session_id}/memory:
    get:
      operationId: getMemory
      summary: Get full saved session memory bundle for diagnostics.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Full memory bundle.
          content:
            application/json:
              schema:
                type: object
  /api/v1/sessions/{session_id}/bootstrap-result:
    post:
      operationId: applyBootstrapResult
      summary: Save bootstrap JSON generated by GPT.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bootstrap_json]
              properties:
                bootstrap_json:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Bootstrap saved.
          content:
            application/json:
              schema:
                type: object
  /api/v1/sessions/{session_id}/scene-contract:
    get:
      operationId: getSceneContract
      summary: Build and return the scene contract for the next GPT-written scene.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Scene contract.
          content:
            application/json:
              schema:
                type: object
  /api/v1/sessions/{session_id}/turn:
    post:
      operationId: processTurn
      summary: Register player input and return the scene prompt for GPT to write from. In debug mode, returns a test scene.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnRequest'
      responses:
        '200':
          description: Scene prompt or debug scene.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnResponse'
  /api/v1/sessions/{session_id}/apply-turn-result:
    post:
      operationId: applyTurnResult
      summary: Validate and save the GPT scene response and proposed state updates.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scene_response]
              properties:
                scene_response:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Apply result.
          content:
            application/json:
              schema:
                type: object
components:
  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    CreateSessionRequest:
      type: object
      additionalProperties: true
      properties:
        title:
          type: string
          nullable: true
        genre:
          type: string
          default: ''
        language:
          type: string
          default: ru
        tone:
          type: string
          nullable: true
        setting_request:
          type: string
          default: ''
        protagonist_request:
          type: string
          default: ''
        romance_request:
          type: string
          nullable: true
        rating:
          type: string
          nullable: true
        avoid:
          type: array
          items:
            type: string
        extra:
          type: object
          additionalProperties: true
        raw_start_text:
          type: string
          nullable: true
        mode:
          type: string
          enum: [gpt_actions, debug_stub]
          default: gpt_actions
    CreateSessionResponse:
      type: object
      properties:
        session_id:
          type: string
          nullable: true
        status:
          type: string
        mode:
          type: string
        bootstrap_prompt:
          type: string
          nullable: true
        questionnaire:
          type: string
          nullable: true
        files_created:
          type: array
          items:
            type: string
    TurnRequest:
      type: object
      required: [player_input]
      properties:
        player_input:
          type: string
        mode:
          type: string
          enum: [gpt_actions, debug_stub]
          default: gpt_actions
    TurnResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        scene:
          type: string
          nullable: true
        scene_prompt:
          type: string
          nullable: true
        diagnostics:
          type: object
          additionalProperties: true
