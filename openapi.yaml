openapi: 3.1.0
info:
  title: Romance Novella Generator API
  version: gpt-actions-v9
  description: Railway API for generated novella sessions. Preview must be shown via message_to_user. Turn JSON must be saved through applyTurnResult before showing scene.rendered_text.
servers:
  - url: https://web-production-4310e.up.railway.app
    description: Railway production
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      operationId: health
      summary: Check API health.
      security: []
      responses:
        '200':
          description: API health response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}
                  engine_version: {type: string}
                  data_dir: {type: string}
                  mode: {type: string}
                  api_key_required: {type: boolean}
  /api/v1/start-questionnaire:
    get:
      operationId: getStartQuestionnaire
      summary: Return the short start questionnaire.
      responses:
        '200':
          description: Questionnaire text.
          content:
            application/json:
              schema:
                type: object
                properties:
                  questionnaire: {type: string}
  /api/v1/sessions:
    post:
      operationId: createSession
      summary: Create a new novella session or return a questionnaire if setup is too empty.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created or questionnaire returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
  /api/v1/sessions/{session_id}:
    get:
      operationId: getSession
      summary: Get basic session metadata.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session metadata.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-preview:
    post:
      operationId: createBootstrapPreview
      summary: Creates preview. Assistant final answer MUST be response.message_to_user. Do not summarize. Do not start a scene.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bootstrap_json:
                  type: object
                  properties: {}
                  additionalProperties: true
              required: [bootstrap_json]
      responses:
        '200':
          description: Preview ready. MUST output message_to_user to the user and wait for explicit confirmation or edits.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapPreviewResponse'
  /api/v1/sessions/{session_id}/bootstrap-confirm:
    post:
      operationId: confirmBootstrapPreview
      summary: Commit pending bootstrap preview only after explicit user confirmation.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapConfirmRequest'
      responses:
        '200':
          description: Bootstrap committed and session became active.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapConfirmResponse'
  /api/v1/sessions/{session_id}/turn:
    post:
      operationId: processTurn
      summary: Build compact scene_prompt. Assistant must generate scene_response internally, then call applyTurnResult, then show only scene.rendered_text.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnRequest'
      responses:
        '200':
          description: Compact scene prompt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnResponse'
  /api/v1/sessions/{session_id}/apply-turn-result:
    post:
      operationId: applyTurnResult
      summary: Validate, normalize and apply GPT scene_response JSON to saved state. After success, assistant must show only scene.rendered_text.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scene_response:
                  type: object
                  properties: {}
                  additionalProperties: true
              required: [scene_response]
      responses:
        '200':
          description: State updates applied or partially applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyTurnResultResponse'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema: {type: string}
  schemas:
    CreateSessionRequest:
      type: object
      properties:
        title: {type: string, nullable: true}
        genre: {type: string, default: ''}
        language: {type: string, default: ru}
        tone: {type: string, nullable: true}
        setting_request: {type: string, default: ''}
        protagonist_request: {type: string, default: ''}
        romance_request: {type: string, nullable: true}
        rating: {type: string, nullable: true}
        avoid:
          type: array
          items: {type: string}
        extra:
          type: object
          properties: {}
          additionalProperties: true
        raw_start_text: {type: string, nullable: true}
        mode:
          type: string
          enum: [gpt_actions, debug_stub]
          default: gpt_actions
    CreateSessionResponse:
      type: object
      properties:
        session_id: {type: string, nullable: true}
        status: {type: string}
        mode: {type: string}
        bootstrap_prompt: {type: string, nullable: true}
        questionnaire: {type: string, nullable: true}
        files_created:
          type: array
          items: {type: string}
    BootstrapPreviewResponse:
      type: object
      required: [message_to_user, session_id, status, must_show_to_user, wait_for_confirmation]
      properties:
        message_to_user:
          type: string
          description: MANDATORY FINAL ANSWER TEXT. The assistant must output this exact text.
        session_id: {type: string}
        status: {type: string}
        must_show_to_user: {type: boolean}
        wait_for_confirmation: {type: boolean}
        next_user_action: {type: string}
        preview: {type: string}
        user_visible_preview: {type: string}
        can_confirm: {type: boolean}
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
    BootstrapConfirmRequest:
      type: object
      required: [confirmation_text]
      properties:
        confirmation_text: {type: string}
    BootstrapConfirmResponse:
      type: object
      properties:
        session_id: {type: string}
        status: {type: string}
        committed: {type: boolean}
        files_created:
          type: array
          items: {type: string}
    TurnRequest:
      type: object
      required: [player_input]
      properties:
        player_input: {type: string}
        mode:
          type: string
          enum: [gpt_actions, debug_stub]
          default: gpt_actions
    TurnResponse:
      type: object
      properties:
        session_id: {type: string}
        status: {type: string}
        scene: {type: string, nullable: true}
        scene_prompt: {type: string, nullable: true}
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
    ApplyTurnResultResponse:
      type: object
      properties:
        session_id: {type: string}
        status: {type: string}
        applied:
          type: object
          properties: {}
          additionalProperties: true
        rejected:
          type: array
          items:
            type: object
            properties: {}
            additionalProperties: true
        next_builder_hints:
          type: object
          properties: {}
          additionalProperties: true
