openapi: 3.1.0
info:
  title: Romance Novella Generator API
  version: gpt-actions-v9
  description: Railway API used by a Custom GPT as memory, context builder, validator, preview gate, and state storage for generated novella sessions.
servers:
  - url: https://web-production-4310e.up.railway.app
    description: Railway production
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      operationId: health
      summary: Check API health.
      security: []
      responses:
        '200':
          description: API health response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}
                  engine_version: {type: string}
                  data_dir: {type: string}
                  mode: {type: string}
                  api_key_required: {type: boolean}
  /api/v1/start-questionnaire:
    get:
      operationId: getStartQuestionnaire
      summary: Return the short start questionnaire.
      responses:
        '200':
          description: Questionnaire text.
          content:
            application/json:
              schema:
                type: object
                properties:
                  questionnaire: {type: string}
  /api/v1/sessions:
    post:
      operationId: createSession
      summary: Create a new novella session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: New session, pending bootstrap prompt, debug session, or questionnaire.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
    get:
      operationId: listSessions
      summary: List saved session IDs.
      responses:
        '200':
          description: Session list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items: {type: string}
  /api/v1/sessions/latest:
    get:
      operationId: getLatestSession
      summary: Return the latest active session.
      responses:
        '200':
          description: Latest session.
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id: {type: string}
                  session:
                    type: object
                    properties: {}
                    additionalProperties: true
  /api/v1/sessions/{session_id}:
    get:
      operationId: getSession
      summary: Get basic session metadata.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session metadata.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/memory:
    get:
      operationId: getMemory
      summary: Get full saved session memory bundle.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Full memory bundle.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-result:
    post:
      operationId: applyBootstrapResult
      summary: Save GPT-generated bootstrap JSON into the pending session.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bootstrap_json:
                  type: object
                  properties: {}
                  additionalProperties: true
              required: [bootstrap_json]
      responses:
        '200':
          description: Bootstrap saved.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-preview:
    post:
      operationId: createBootstrapPreview
      summary: Validate and store bootstrap JSON as a review preview.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bootstrap_json:
                  type: object
                  properties: {}
                  additionalProperties: true
              required: [bootstrap_json]
      responses:
        '200':
          description: Preview ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapPreviewResponse'
  /api/v1/sessions/{session_id}/bootstrap-confirm:
    post:
      operationId: confirmBootstrapPreview
      summary: Commit the pending bootstrap preview.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Bootstrap committed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapConfirmResponse'
  /api/v1/sessions/{session_id}/scene-contract:
    get:
      operationId: getSceneContract
      summary: Build the current scene contract from saved state.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Scene contract for GPT.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/turn:
    post:
      operationId: processTurn
      summary: Build a GPT scene prompt from state and player input.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnRequest'
      responses:
        '200':
          description: Scene prompt or debug scene.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnResponse'
  /api/v1/sessions/{session_id}/apply-turn-result:
    post:
      operationId: applyTurnResult
      summary: Validate and apply GPT scene_response JSON to saved state.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scene_response:
                  type: object
                  properties: {}
                  additionalProperties: true
              required: [scene_response]
      responses:
        '200':
          description: State updates applied or partially applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyTurnResultResponse'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema: {type: string}
  schemas:
    CreateSessionRequest:
      type: object
      properties:
        title: {type: string, nullable: true}
        genre: {type: string, default: ''}
        language: {type: string, default: ru}
        tone: {type: string, nullable: true}
        setting_request: {type: string, default: ''}
        protagonist_request: {type: string, default: ''}
        romance_request: {type: string, nullable: true}
        rating: {type: string, nullable: true}
        avoid:
          type: array
          items: {type: string}
        extra:
          type: object
          properties: {}
          additionalProperties: true
        raw_start_text: {type: string, nullable: true}
        mode:
          type: string
          enum: [gpt_actions, debug_stub]
          default: gpt_actions
    CreateSessionResponse:
      type: object
      properties:
        session_id: {type: string, nullable: true}
        status: {type: string}
        mode: {type: string}
        bootstrap_prompt: {type: string, nullable: true}
        questionnaire: {type: string, nullable: true}
        files_created:
          type: array
          items: {type: string}
    BootstrapPreviewResponse:
      type: object
      properties:
        session_id: {type: string}
        status: {type: string}
        preview: {type: string}
        can_confirm: {type: boolean}
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
    BootstrapConfirmResponse:
      type: object
      properties:
        session_id: {type: string}
        status: {type: string}
        committed: {type: boolean}
        files_created:
          type: array
          items: {type: string}
    TurnRequest:
      type: object
      required: [player_input]
      properties:
        player_input: {type: string}
        mode:
          type: string
          enum: [gpt_actions, debug_stub]
          default: gpt_actions
    TurnResponse:
      type: object
      properties:
        session_id: {type: string}
        status: {type: string}
        scene: {type: string, nullable: true}
        scene_prompt: {type: string, nullable: true}
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
    ApplyTurnResultResponse:
      type: object
      properties:
        session_id: {type: string}
        status: {type: string}
        applied:
          type: object
          properties: {}
          additionalProperties: true
        rejected:
          type: array
          items:
            type: object
            properties: {}
            additionalProperties: true
        next_builder_hints:
          type: object
          properties: {}
          additionalProperties: true
