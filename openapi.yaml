      required:
      - session_id
      - status
      - turn_id
      - message_to_user
      - must_show_to_user
      - replayed
      - saved_turn_number
      - applied
      - rejected
      - next_builder_hints
    LastSceneResponse:
      type: object
      properties:
        session_id:
          type: string
        available:
          type: boolean
        turn_id:
          type:
          - string
          - 'null'
        saved_turn_number:
          type:
          - integer
          - 'null'
          minimum: 0
        message_to_user:
          type: string
        must_show_to_user:
          type: boolean
        recovered_from:
          type: string
        summary:
          type:
          - string
          - 'null'
        body_excerpt:
          type:
          - string
          - 'null'
      additionalProperties: false
      required:
      - session_id
      - available
      - message_to_user
      - must_show_to_user
      - recovered_from
paths:
  /health:
    get:
      operationId: health
      summary: Check API health. This is a technical check only; do not continue a scene.
      security: []
      responses:
        '200': &id001
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/start-questionnaire:
    get:
      operationId: getStartQuestionnaire
      summary: Get the visible start questionnaire when the user gave too little setup.
      responses:
        '200': *id001
  /api/v1/sessions:
    post:
      operationId: createSession
      summary: Create a session from exactly raw_start_text plus optional mode. Never split the questionnaire
        into title/genre/character kwargs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created or questionnaire required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
  /api/v1/sessions/{session_id}:
    get:
      operationId: getSession
      summary: Get one session status by session_id.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200': *id001
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/debug-dump:
    get:
      operationId: debugSessionDump
      summary: Compact technical debug dump for bootstrap_pending, bootstrap_review_pending or active.
        Do not use it for normal scene continuation.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          description: Debug session dump
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebugSessionDumpResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '409':
          description: Session status is not debuggable
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-preview:
    post:
      operationId: createBootstrapPreview
      summary: Submit one complete bootstrap object, let Railway normalize technical state, and create
        the spoiler-free preview. Partial questionnaires are valid.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapPreviewRequest'
      responses:
        '200':
          description: Bootstrap preview created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapPreviewResponse'
        '409':
          description: Session cannot accept a preview.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Bootstrap is structurally invalid.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-preview-chunk:
    get:
      operationId: getBootstrapPreviewChunk
      summary: Get one stored bootstrap preview fragment. Start at chunk_index=1 because preview creation
        already returned chunk 0. Concatenate every fragment before showing anything to the user.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      - name: chunk_index
        in: query
        required: true
        schema:
          type: integer
          minimum: 0
        description: Zero-based preview chunk index. Normally start at 1 because preview creation returned
          chunk 0; start at 0 when recovering a lost/ResponseTooLarge preview response from debugSessionDump.
      - name: preview_id
        in: query
        required: true
        schema:
          type: string
          minLength: 1
        description: Exact preview_id returned by the latest preview response.
      responses:
        '200':
          description: Bootstrap preview chunk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapPreviewChunkResponse'
        '404':
          description: Stored preview not found
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '409':
          description: Stale preview_id or preview no longer awaiting review
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '416':
          description: Chunk index out of range
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-confirm:
    post:
      operationId: confirmBootstrapPreview
      summary: Commit pending bootstrap after explicit user confirmation.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapConfirmRequest'
      responses:
        '200':
          description: Bootstrap committed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapConfirmResponse'
        '409':
          description: Preview not confirmed or wrong session status
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/turn:
    post:
      operationId: processTurn
      summary: Build one compact/chunked scene prompt. Returns the pending turn_id; applyTurnResult must
        use that exact id.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnRequest'
      responses:
        '200':
          description: Pending turn and first prompt chunk.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnResponse'
        '409':
          description: Session inactive or another different turn is pending.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Empty input
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/advance-time:
    post:
      operationId: advanceTime
      summary: Create a guarded time-skip prompt only after the scene saved a natural pause.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceTimeRequest'
      responses:
        '200':
          description: Pending time-skip turn and first prompt chunk.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnResponse'
        '409':
          description: Time skip blocked or another turn is pending.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Invalid time skip request.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/turn-prompt-chunk:
    get:
      operationId: getTurnPromptChunk
      summary: Get one stored prompt chunk after processTurn returns more than one chunk.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      - name: turn_id
        in: query
        required: true
        schema:
          type: string
          minLength: 1
        description: Exact turn_id returned by processTurn.
      - name: chunk_index
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
        description: Start at 1 because processTurn already returned chunk 0.
      responses:
        '200':
          description: Prompt chunk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnPromptChunkResponse'
        '409':
          description: Missing/stale pending turn
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '416':
          description: Chunk index out of range
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/apply-turn-result:
    post:
      operationId: applyTurnResult
      summary: 'Validate and atomically save flat scene fields. Do not send rendered_text: Railway builds
        it. Repeating the same turn_id safely replays the saved response; final assistant answer is message_to_user.'
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyTurnResultRequest'
      responses:
        '200':
          description: Turn saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyTurnResultResponse'
        '409':
          description: Missing, stale, duplicate or mismatched turn_id
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Invalid scene_response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/last-scene:
    get:
      operationId: getLastScene
      summary: Recover the most recently saved visible scene after a missing/oversized Action response.
        This never creates a turn or changes state. Show message_to_user only when available=true.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          description: Last saved visible scene or compact legacy recovery information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LastSceneResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '409':
          description: Session is not active
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
