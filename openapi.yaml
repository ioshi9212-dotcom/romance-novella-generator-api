openapi: 3.1.0
info:
  title: Romance Novella Generator API
  version: gpt-actions-v9.2-playable-bootstrap
  description: Custom GPT Actions schema for generated novella sessions. Use questionnaire, one bootstrap
    preview call, preview-confirm launch flow, chunked processTurn, then flat applyTurnResult with the
    exact turn_id. Railway renders and retains the visible scene; getLastScene recovers a lost Action
    response without creating a new turn.
servers:
- url: https://web-production-4310e.up.railway.app
security:
- ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    SceneResponse:
      type: object
      properties:
        response_version:
          const: novella.scene_response.v1
        player_input:
          type: string
          minLength: 1
        scene:
          type: object
          properties:
            header:
              type: object
              properties:
                story_title:
                  type: string
                  minLength: 1
                date:
                  type: string
                  minLength: 1
                time:
                  type: string
                  minLength: 1
                location:
                  type: string
                  minLength: 1
                weather:
                  type: string
                  minLength: 1
                scene_state:
                  type: string
                  minLength: 1
                player_name:
                  type: string
                  minLength: 1
                visible_state:
                  type: string
                  minLength: 1
                outfit:
                  type: string
                  minLength: 1
                inventory:
                  type: string
                  minLength: 1
              additionalProperties: false
              required:
              - story_title
              - date
              - time
              - location
              - weather
              - scene_state
              - player_name
              - visible_state
              - outfit
              - inventory
            body:
              type: string
              minLength: 500
              description: Complete prose and dialogue. Railway builds the visible rendered scene from
                this body; do not send rendered_text.
            player_options:
              type: object
              properties:
                actions:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    type: string
                    minLength: 1
                dialogue:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    type: string
                    minLength: 1
                thoughts:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    type: string
                    minLength: 1
              additionalProperties: false
              required:
              - actions
              - dialogue
              - thoughts
            status_panel:
              type: object
              properties:
                hunger:
                  type: string
                fatigue:
                  type: string
                injuries:
                  type: string
                emotional_state:
                  type: string
                skills:
                  type: string
                custom:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        enum:
                        - story_slot_1
                        - story_slot_2
                      label:
                        type: string
                      value:
                        type: string
                    additionalProperties: false
                    required:
                    - id
                    - label
                    - value
              additionalProperties: false
              required:
              - hunger
              - fatigue
              - injuries
              - emotional_state
              - skills
              - custom
            relationships_panel:
              type: array
              items:
                type: object
                properties:
                  pair_id:
                    type:
                    - string
                    - 'null'
                  label:
                    type: string
                  value:
                    type: string
                additionalProperties: false
                required:
                - label
                - value
          additionalProperties: false
          required:
          - header
          - body
          - player_options
          - status_panel
          - relationships_panel
        summary:
          type: string
          minLength: 1
        important_facts:
          type: array
          items:
            type: string
        witnesses:
          type: array
          items:
            oneOf:
            - type: string
            - type: object
              properties: {}
              additionalProperties: true
        proposed_updates:
          type: object
          properties:
            scene_state_patch:
              type: object
              properties: {}
              additionalProperties: true
            continuity_patch:
              type: object
              properties: {}
              additionalProperties: true
            relationship_patches:
              type: array
              items:
                type: object
                properties: {}
                additionalProperties: true
            knowledge_patches:
              type: array
              items:
                type: object
                properties: {}
                additionalProperties: true
            npc_state_patches:
              type: array
              items:
                type: object
                properties: {}
                additionalProperties: true
            director_bible_patches:
              oneOf:
              - type: object
                properties: {}
                additionalProperties: true
              - type: array
                maxItems: 0
                items:
                  type: object
                  properties: {}
                  additionalProperties: true
              description: Use an object; use {} when there are no director updates. Legacy empty [] is
                tolerated.
            new_or_updated_characters:
              type: array
              items:
                type: object
                properties: {}
                additionalProperties: true
          additionalProperties: false
          required:
          - scene_state_patch
          - continuity_patch
          - relationship_patches
          - knowledge_patches
          - npc_state_patches
          - director_bible_patches
          - new_or_updated_characters
        safety_checks:
          type: object
          properties:
            used_only_loaded_characters:
              const: true
            respected_knowledge_boundaries:
              const: true
            no_hidden_future_reveal:
              const: true
            no_major_player_character_choice:
              const: true
            respected_player_input_order:
              const: true
            showed_only_scene_relationships:
              const: true
            header_has_no_focus_or_active_list:
              const: true
            notes:
              type: array
              items:
                type: string
          additionalProperties: false
          required:
          - used_only_loaded_characters
          - respected_knowledge_boundaries
          - no_hidden_future_reveal
          - no_major_player_character_choice
          - respected_player_input_order
          - showed_only_scene_relationships
          - header_has_no_focus_or_active_list
        time_skip_result:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: false
      required:
      - response_version
      - player_input
      - scene
      - summary
      - important_facts
      - witnesses
      - proposed_updates
      - safety_checks
    CreateSessionRequest:
      type: object
      properties:
        raw_start_text:
          type: string
          minLength: 1
          description: The one canonical setup field. Copy the user's complete questionnaire answer verbatim
            into this string; do not split it into title, genre, protagonist or other Action kwargs. Partial
            answers are valid and the bootstrap generator fills every unspecified detail.
        mode:
          type: string
          enum:
          - gpt_actions
          - debug_stub
          default: gpt_actions
      additionalProperties: false
      required:
      - raw_start_text
    CreateSessionResponse:
      type: object
      properties:
        session_id:
          type:
          - string
          - 'null'
        status:
          type: string
        mode:
          type: string
        bootstrap_prompt:
          type:
          - string
          - 'null'
        questionnaire:
          type:
          - string
          - 'null'
        files_created:
          type: array
          items:
            type: string
      additionalProperties: true
      required:
      - session_id
      - status
      - mode
      - bootstrap_prompt
      - questionnaire
      - files_created
    BootstrapPreviewRequest:
      type: object
      properties:
        bootstrap_json:
          type: object
          properties: {}
          additionalProperties: true
          description: One complete bootstrap object created from bootstrap_prompt. Keep every root section
            inside this object. Partial user input is valid; invent unspecified story details.
      additionalProperties: false
      required:
      - bootstrap_json
    BootstrapPreviewResponse:
      type: object
      properties:
        message_to_user:
          type: string
          description: Full preview for inline responses; chunk 0 when has_more_preview_chunks=true. Do
            not show chunk 0 alone.
        session_id:
          type: string
        status:
          type: string
        must_show_to_user:
          type: boolean
        wait_for_confirmation:
          type: boolean
        next_user_action:
          type: string
        can_confirm:
          type: boolean
        preview_id:
          type: string
          minLength: 1
        preview_chars:
          type: integer
          minimum: 0
        preview_chunk_index:
          type: integer
          minimum: 0
        preview_chunk_count:
          type: integer
          minimum: 1
        has_more_preview_chunks:
          type: boolean
        next_preview_chunk_index:
          type:
          - integer
          - 'null'
          minimum: 0
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: true
      required:
      - message_to_user
      - session_id
      - status
      - must_show_to_user
      - wait_for_confirmation
      - next_user_action
      - can_confirm
      - preview_id
      - preview_chars
      - preview_chunk_index
      - preview_chunk_count
      - has_more_preview_chunks
      - next_preview_chunk_index
    BootstrapPreviewChunkResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        preview_id:
          type: string
          minLength: 1
        preview_chars:
          type: integer
          minimum: 0
        chunk_index:
          type: integer
          minimum: 0
        chunk_count:
          type: integer
          minimum: 1
        preview_chunk:
          type: string
          description: One ordered fragment. Concatenate with chunk 0 and every other fragment before
            showing the preview.
        has_more:
          type: boolean
        next_chunk_index:
          type:
          - integer
          - 'null'
          minimum: 0
        must_show_to_user:
          type: boolean
        ready_to_show_full_preview:
          type: boolean
        can_confirm:
          type: boolean
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: true
      required:
      - session_id
      - status
      - preview_id
      - preview_chars
      - chunk_index
      - chunk_count
      - preview_chunk
      - has_more
      - next_chunk_index
      - must_show_to_user
      - ready_to_show_full_preview
      - can_confirm
    BootstrapConfirmRequest:
      type: object
      properties:
        confirmation_text:
          type: string
          minLength: 1
          description: Exact latest user confirmation message.
      additionalProperties: false
      required:
      - confirmation_text
    BootstrapConfirmResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        committed:
          type: boolean
        files_created:
          type: array
          items:
            type: string
      additionalProperties: true
      required:
      - session_id
      - status
      - committed
      - files_created
    TurnRequest:
      type: object
      properties:
        player_input:
          type: string
          minLength: 1
          description: Exact latest player input. Use '(начать первую сцену)' only immediately after bootstrap
            confirmation.
        mode:
          type: string
          enum:
          - gpt_actions
          - debug_stub
          default: gpt_actions
      additionalProperties: false
      required:
      - player_input
    AdvanceTimeRequest:
      type: object
      properties:
        player_input:
          type: string
          minLength: 1
          description: Exact latest user request selecting time skip.
        skip_mode:
          type: string
          enum:
          - nearest_event
          - duration
          default: nearest_event
        unit:
          type:
          - string
          - 'null'
          enum:
          - hours
          - days
          - weeks
          - months
          - null
        amount:
          type:
          - integer
          - 'null'
          minimum: 1
          maximum: 365
      additionalProperties: false
      required:
      - player_input
    TurnResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        scene:
          type:
          - string
          - 'null'
        scene_prompt:
          type:
          - string
          - 'null'
        scene_prompt_chunk:
          type:
          - string
          - 'null'
        prompt_chunk_index:
          type: integer
        prompt_chunk_count:
          type: integer
          minimum: 1
        has_more_prompt_chunks:
          type: boolean
        next_prompt_chunk_index:
          type:
          - integer
          - 'null'
        turn_id:
          type:
          - string
          - 'null'
        expected_turn_number:
          type:
          - integer
          - 'null'
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: true
      required:
      - session_id
      - status
      - scene
      - scene_prompt
      - scene_prompt_chunk
      - prompt_chunk_index
      - prompt_chunk_count
      - has_more_prompt_chunks
      - next_prompt_chunk_index
      - turn_id
      - expected_turn_number
      - diagnostics
    TurnPromptChunkResponse:
      type: object
      properties:
        session_id:
          type: string
        turn_id:
          type: string
        chunk_index:
          type: integer
        chunk_count:
          type: integer
        scene_prompt_chunk:
          type: string
        has_more:
          type: boolean
        next_chunk_index:
          type:
          - integer
          - 'null'
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: false
      required:
      - session_id
      - turn_id
      - chunk_index
      - chunk_count
      - scene_prompt_chunk
      - has_more
    DebugSessionDumpResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        server:
          type: object
          properties: {}
          additionalProperties: true
        session:
          type: object
          properties: {}
          additionalProperties: true
        current_state:
          type: object
          properties: {}
          additionalProperties: true
        story_plan:
          type: object
          properties: {}
          additionalProperties: true
        characters:
          type: object
          properties: {}
          additionalProperties: true
        knowledge:
          type: object
          properties: {}
          additionalProperties: true
        relationships:
          type: object
          properties: {}
          additionalProperties: true
        history:
          type: object
          properties: {}
          additionalProperties: true
        pending_turn:
          type: object
          properties: {}
          additionalProperties: true
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: false
      required:
      - session_id
      - status
      - server
      - session
      - current_state
      - story_plan
      - characters
      - knowledge
      - relationships
      - history
      - pending_turn
    ApplyTurnResultRequest:
      type: object
      properties:
        turn_id:
          type: string
          minLength: 1
          description: Exact turn_id returned by processTurn.
        response_version:
          const: novella.scene_response.v1
        player_input:
          type: string
          minLength: 1
        scene:
          type: object
          properties:
            header:
              type: object
              properties:
                story_title:
                  type: string
                  minLength: 1
                date:
                  type: string
                  minLength: 1
                time:
                  type: string
                  minLength: 1
                location:
                  type: string
                  minLength: 1
                weather:
                  type: string
                  minLength: 1
                scene_state:
                  type: string
                  minLength: 1
                player_name:
                  type: string
                  minLength: 1
                visible_state:
                  type: string
                  minLength: 1
                outfit:
                  type: string
                  minLength: 1
                inventory:
                  type: string
                  minLength: 1
              additionalProperties: false
              required:
              - story_title
              - date
              - time
              - location
              - weather
              - scene_state
              - player_name
              - visible_state
              - outfit
              - inventory
            body:
              type: string
              minLength: 500
              description: Complete prose and dialogue. Railway builds the visible rendered scene from
                this body; do not send rendered_text.
            player_options:
              type: object
              properties:
                actions:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    type: string
                    minLength: 1
                dialogue:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    type: string
                    minLength: 1
                thoughts:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    type: string
                    minLength: 1
              additionalProperties: false
              required:
              - actions
              - dialogue
              - thoughts
            status_panel:
              type: object
              properties:
                hunger:
                  type: string
                fatigue:
                  type: string
                injuries:
                  type: string
                emotional_state:
                  type: string
                skills:
                  type: string
                custom:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        enum:
                        - story_slot_1
                        - story_slot_2
                      label:
                        type: string
                      value:
                        type: string
                    additionalProperties: false
                    required:
                    - id
                    - label
                    - value
              additionalProperties: false
              required:
              - hunger
              - fatigue
              - injuries
              - emotional_state
              - skills
              - custom
            relationships_panel:
              type: array
              items:
                type: object
                properties:
                  pair_id:
                    type:
                    - string
                    - 'null'
                  label:
                    type: string
                  value:
                    type: string
                additionalProperties: false
                required:
                - label
                - value
          additionalProperties: false
          required:
          - header
          - body
          - player_options
          - status_panel
          - relationships_panel
        summary:
          type: string
          minLength: 1
        important_facts:
          type: array
          items:
            type: string
        witnesses:
          type: array
          items:
            oneOf:
            - type: string
            - type: object
              properties: {}
              additionalProperties: true
        proposed_updates:
          type: object
          properties:
            scene_state_patch:
              type: object
              properties: {}
              additionalProperties: true
            continuity_patch:
              type: object
              properties: {}
              additionalProperties: true
            relationship_patches:
              type: array
              items:
                type: object
                properties: {}
                additionalProperties: true
            knowledge_patches:
              type: array
              items:
                type: object
                properties: {}
                additionalProperties: true
            npc_state_patches:
              type: array
              items:
                type: object
                properties: {}
                additionalProperties: true
            director_bible_patches:
              oneOf:
              - type: object
                properties: {}
                additionalProperties: true
              - type: array
                maxItems: 0
                items:
                  type: object
                  properties: {}
                  additionalProperties: true
              description: Use an object; use {} when there are no director updates. Legacy empty [] is
                tolerated.
            new_or_updated_characters:
              type: array
              items:
                type: object
                properties: {}
                additionalProperties: true
          additionalProperties: false
          required:
          - scene_state_patch
          - continuity_patch
          - relationship_patches
          - knowledge_patches
          - npc_state_patches
          - director_bible_patches
          - new_or_updated_characters
        safety_checks:
          type: object
          properties:
            used_only_loaded_characters:
              const: true
            respected_knowledge_boundaries:
              const: true
            no_hidden_future_reveal:
              const: true
            no_major_player_character_choice:
              const: true
            respected_player_input_order:
              const: true
            showed_only_scene_relationships:
              const: true
            header_has_no_focus_or_active_list:
              const: true
            notes:
              type: array
              items:
                type: string
          additionalProperties: false
          required:
          - used_only_loaded_characters
          - respected_knowledge_boundaries
          - no_hidden_future_reveal
          - no_major_player_character_choice
          - respected_player_input_order
          - showed_only_scene_relationships
          - header_has_no_focus_or_active_list
        time_skip_result:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: false
      required:
      - turn_id
      - response_version
      - player_input
      - scene
      - summary
      - important_facts
      - witnesses
      - proposed_updates
      - safety_checks
    ApplyTurnResultResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        turn_id:
          type: string
        message_to_user:
          type: string
        must_show_to_user:
          type: boolean
        replayed:
          type: boolean
        saved_turn_number:
          type: integer
          minimum: 0
        applied:
          type: object
          properties: {}
          additionalProperties: true
        rejected:
          type: array
          items:
            type: object
            properties: {}
            additionalProperties: true
        next_builder_hints:
          type: object
          properties: {}
          additionalProperties: true
