      - user_visible_preview
      - can_confirm
      - preview_id
      - preview_chars
      - preview_chunk_index
      - preview_chunk_count
      - has_more_preview_chunks
      - next_preview_chunk_index
      - repair_required
      - repair_errors
      - repair_plan
      - repair_prompt
    BootstrapPreviewChunkResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        preview_id:
          type: string
          minLength: 1
        preview_chars:
          type: integer
          minimum: 0
        chunk_index:
          type: integer
          minimum: 0
        chunk_count:
          type: integer
          minimum: 1
        preview_chunk:
          type: string
          description: One ordered fragment. Concatenate with chunk 0 and every other fragment before
            showing the preview.
        has_more:
          type: boolean
        next_chunk_index:
          type:
          - integer
          - 'null'
          minimum: 0
        must_show_to_user:
          type: boolean
        ready_to_show_full_preview:
          type: boolean
        can_confirm:
          type: boolean
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: true
      required:
      - session_id
      - status
      - preview_id
      - preview_chars
      - chunk_index
      - chunk_count
      - preview_chunk
      - has_more
      - next_chunk_index
      - must_show_to_user
      - ready_to_show_full_preview
      - can_confirm
    SaveBootstrapPartRequest:
      type: object
      properties:
        section:
          type: string
          enum:
          - protagonist
          - characters
          - relationships
          - knowledge
          - story_plan
          - director_bible
          - current_state
          - npc_state
          - future_locks
          - continuity
          description: Bootstrap root section to stage.
        item_id:
          type:
          - string
          - 'null'
          description: For map sections, send one entry id. Normal setup uses it once per characters card.
        value:
          type: object
          properties: {}
          additionalProperties: true
          description: One complete character card, story_plan, current_state, or authored director_bible
            matching the same-named BootstrapPayload section. Do not send the full bootstrap here.
        delete_fields:
          type: array
          items:
            type: string
          default: []
          description: Explicit dotted field paths to delete after deep merge.
        replace:
          type: boolean
          default: false
          description: Replace instead of deep merge. Use only for an intentional full replacement.
      additionalProperties: false
      required:
      - section
      - value
    SaveBootstrapPartResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        section:
          type: string
        item_id:
          type:
          - string
          - 'null'
        stored:
          type: boolean
        progress:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: true
      required:
      - session_id
      - status
      - section
      - item_id
      - stored
      - progress
    BootstrapConfirmRequest:
      type: object
      properties:
        confirmation_text:
          type: string
          minLength: 1
          description: Exact latest user confirmation message.
      additionalProperties: false
      required:
      - confirmation_text
    BootstrapConfirmResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        committed:
          type: boolean
        files_created:
          type: array
          items:
            type: string
      additionalProperties: true
      required:
      - session_id
      - status
      - committed
      - files_created
    TurnRequest:
      type: object
      properties:
        player_input:
          type: string
          minLength: 1
          description: Exact latest player input. Use '(начать первую сцену)' only immediately after bootstrap
            confirmation.
        mode:
          type: string
          enum:
          - gpt_actions
          - debug_stub
          default: gpt_actions
      additionalProperties: false
      required:
      - player_input
    AdvanceTimeRequest:
      type: object
      properties:
        player_input:
          type: string
          minLength: 1
          description: Exact latest user request selecting time skip.
        skip_mode:
          type: string
          enum:
          - nearest_event
          - duration
          default: nearest_event
        unit:
          type:
          - string
          - 'null'
          enum:
          - hours
          - days
          - weeks
          - months
          - null
        amount:
          type:
          - integer
          - 'null'
          minimum: 1
          maximum: 365
      additionalProperties: false
      required:
      - player_input
    TurnResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        scene:
          type:
          - string
          - 'null'
        scene_prompt:
          type:
          - string
          - 'null'
        scene_prompt_chunk:
          type:
          - string
          - 'null'
        prompt_chunk_index:
          type: integer
        prompt_chunk_count:
          type: integer
          minimum: 1
        has_more_prompt_chunks:
          type: boolean
        next_prompt_chunk_index:
          type:
          - integer
          - 'null'
        turn_id:
          type:
          - string
          - 'null'
        expected_turn_number:
          type:
          - integer
          - 'null'
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: true
      required:
      - session_id
      - status
      - scene
      - scene_prompt
      - scene_prompt_chunk
      - prompt_chunk_index
      - prompt_chunk_count
      - has_more_prompt_chunks
      - next_prompt_chunk_index
      - turn_id
      - expected_turn_number
      - diagnostics
    TurnPromptChunkResponse:
      type: object
      properties:
        session_id:
          type: string
        turn_id:
          type: string
        chunk_index:
          type: integer
        chunk_count:
          type: integer
        scene_prompt_chunk:
          type: string
        has_more:
          type: boolean
        next_chunk_index:
          type:
          - integer
          - 'null'
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: false
      required:
      - session_id
      - turn_id
      - chunk_index
      - chunk_count
      - scene_prompt_chunk
      - has_more
    DebugSessionDumpResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        server:
          type: object
          properties: {}
          additionalProperties: true
        session:
          type: object
          properties: {}
          additionalProperties: true
        current_state:
          type: object
          properties: {}
          additionalProperties: true
        story_plan:
          type: object
          properties: {}
          additionalProperties: true
        characters:
          type: object
          properties: {}
          additionalProperties: true
        knowledge:
          type: object
          properties: {}
          additionalProperties: true
        relationships:
          type: object
          properties: {}
          additionalProperties: true
        history:
          type: object
          properties: {}
          additionalProperties: true
        pending_turn:
          type: object
          properties: {}
          additionalProperties: true
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: false
      required:
      - session_id
      - status
      - server
      - session
      - current_state
      - story_plan
      - characters
      - knowledge
      - relationships
      - history
      - pending_turn
    ApplyTurnResultRequest:
      type: object
      properties:
        turn_id:
          type: string
          minLength: 1
          description: Exact turn_id returned by processTurn.
        scene_response:
          $ref: '#/components/schemas/SceneResponse'
        rendered_text:
          type:
          - string
          - 'null'
          description: Compatibility fallback for older imported Actions.
        proposed_updates:
          type: object
          properties: {}
          additionalProperties: true
        safety_checks:
          type: object
          properties: {}
          additionalProperties: true
        metadata:
          type: object
          properties:
            turn_id:
              type:
              - string
              - 'null'
          additionalProperties: true
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: true
      required:
      - turn_id
      - scene_response
    ApplyTurnResultResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
        message_to_user:
          type: string
        rendered_text:
          type: string
        must_show_to_user:
          type: boolean
        applied:
          type: object
          properties: {}
          additionalProperties: true
        rejected:
          type: array
          items:
            type: object
            properties: {}
            additionalProperties: true
        next_builder_hints:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: true
      required:
      - session_id
      - status
      - message_to_user
      - rendered_text
      - must_show_to_user
      - applied
      - rejected
      - next_builder_hints
paths:
  /health:
    get:
      operationId: health
      summary: Check API health. This is a technical check only; do not continue a scene.
      security: []
      responses:
        '200': &id001
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/start-questionnaire:
    get:
      operationId: getStartQuestionnaire
      summary: Get the visible start questionnaire when the user gave too little setup.
      responses:
        '200': *id001
  /api/v1/sessions:
    post:
      operationId: createSession
      summary: Create a session from exactly raw_start_text plus optional mode. Never split the questionnaire
        into title/genre/character kwargs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created or questionnaire required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
  /api/v1/sessions/{session_id}:
    get:
      operationId: getSession
      summary: Get one session status by session_id.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200': *id001
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/debug-dump:
    get:
      operationId: debugSessionDump
      summary: Compact technical debug dump for bootstrap_pending, bootstrap_review_pending or active.
        Do not use it for normal scene continuation.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          description: Debug session dump
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebugSessionDumpResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '409':
          description: Session status is not debuggable
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-part:
    post:
      operationId: saveBootstrapPart
      summary: Stage one complete character card or one authorial section. Normal flow writes characters,
        story_plan, current_state and director_bible; technical runtime sections are derived.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveBootstrapPartRequest'
      responses:
        '200':
          description: Bootstrap part stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveBootstrapPartResponse'
        '409':
          description: Session cannot accept bootstrap parts.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Invalid bootstrap part.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-preview-finalize:
    post:
      operationId: finalizeBootstrapPreview
      summary: 'Preserve authored characters/story/director state, build missing technical runtime state,
        then create the visible preview. If status=bootstrap_repair_required, do not show the response
        or ask the user again: apply repair_plan with saveBootstrapPart and retry.'
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          description: Bootstrap preview created from staged parts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapPreviewResponse'
        '409':
          description: Staged bootstrap is incomplete or session status is wrong.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Assembled bootstrap is invalid.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-preview:
    post:
      operationId: createBootstrapPreview
      deprecated: true
      summary: Compatibility-only full preview call. Send exactly one body field named bootstrap_json;
        never pass bootstrap root fields as separate Action kwargs. Prefer saveBootstrapPart. If status=bootstrap_repair_required,
        silently apply repair_plan and retry.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapPreviewRequest'
      responses:
        '200':
          description: Bootstrap preview created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapPreviewResponse'
        '422':
          description: Invalid bootstrap JSON
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-preview-chunk:
    get:
      operationId: getBootstrapPreviewChunk
      summary: Get one stored bootstrap preview fragment. Start at chunk_index=1 because preview creation
        already returned chunk 0. Concatenate every fragment before showing anything to the user.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      - name: chunk_index
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
        description: Next zero-based preview chunk index; start at 1.
      - name: preview_id
        in: query
        required: true
        schema:
          type: string
          minLength: 1
        description: Exact preview_id returned by the latest preview response.
      responses:
        '200':
          description: Bootstrap preview chunk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapPreviewChunkResponse'
        '404':
          description: Stored preview not found
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '409':
          description: Stale preview_id or preview no longer awaiting review
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '416':
          description: Chunk index out of range
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-confirm:
    post:
      operationId: confirmBootstrapPreview
      summary: Commit pending bootstrap after explicit user confirmation.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapConfirmRequest'
      responses:
        '200':
          description: Bootstrap committed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapConfirmResponse'
        '409':
          description: Preview not confirmed or wrong session status
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/turn:
    post:
      operationId: processTurn
      summary: Build one compact/chunked scene prompt. Returns the pending turn_id; applyTurnResult must
        use that exact id.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnRequest'
      responses:
        '200':
          description: Pending turn and first prompt chunk.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnResponse'
        '409':
          description: Session inactive or another different turn is pending.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Empty input
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/advance-time:
    post:
      operationId: advanceTime
      summary: Create a guarded time-skip prompt only after the scene saved a natural pause.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceTimeRequest'
      responses:
        '200':
          description: Pending time-skip turn and first prompt chunk.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnResponse'
        '409':
          description: Time skip blocked or another turn is pending.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Invalid time skip request.
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/turn-prompt-chunk:
    get:
      operationId: getTurnPromptChunk
      summary: Get one stored prompt chunk after processTurn returns more than one chunk.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      - name: turn_id
        in: query
        required: true
        schema:
          type: string
          minLength: 1
        description: Exact turn_id returned by processTurn.
      - name: chunk_index
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
        description: Start at 1 because processTurn already returned chunk 0.
      responses:
        '200':
          description: Prompt chunk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnPromptChunkResponse'
        '409':
          description: Missing/stale pending turn
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '416':
          description: Chunk index out of range
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/apply-turn-result:
    post:
      operationId: applyTurnResult
      summary: Validate and atomically save scene_response. Final assistant answer must be response.message_to_user
        only.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyTurnResultRequest'
      responses:
        '200':
          description: Turn saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyTurnResultResponse'
        '409':
          description: Missing, stale, duplicate or mismatched turn_id
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Invalid scene_response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
