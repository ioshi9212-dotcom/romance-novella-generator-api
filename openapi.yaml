openapi: 3.1.0
info:
  title: Romance Novella Generator API
  version: gpt-actions-v9
  description: Railway API for generated novella sessions. Preview and saved scene responses expose message_to_user as the exact text the assistant must show.
servers:
  - url: https://web-production-4310e.up.railway.app
    description: Railway production
security:
  - ApiKeyAuth: []
paths:
  /api/v1/sessions/{session_id}/apply-turn-result:
    post:
      operationId: applyTurnResult
      summary: Save scene_response. Assistant final answer MUST be response.message_to_user.
      responses:
        '200':
          description: State applied and full visible scene returned as message_to_user.
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
