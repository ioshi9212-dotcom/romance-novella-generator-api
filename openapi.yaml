openapi: 3.1.0
info:
  title: Romance Novella Generator API
  version: gpt-actions-v9-openapi-actions
  description: Custom GPT Actions schema for generated novella sessions. Use preview-confirm
    launch flow, then processTurn and applyTurnResult.
servers:
- url: https://web-production-4310e.up.railway.app
security:
- ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    CreateSessionRequest:
      type: object
      properties:
        title:
          type:
          - string
          - 'null'
        genre:
          type: string
          default: ''
        language:
          type: string
          default: ru
        tone:
          type:
          - string
          - 'null'
        setting_request:
          type: string
          default: ''
        protagonist_request:
          type: string
          default: ''
        romance_request:
          type:
          - string
          - 'null'
        rating:
          type:
          - string
          - 'null'
        avoid:
          type: array
          items:
            type: string
        extra:
          type: object
          properties: {}
          additionalProperties: true
        raw_start_text:
          type:
          - string
          - 'null'
        mode:
          type: string
          enum:
          - gpt_actions
          - debug_stub
          default: gpt_actions
      additionalProperties: true
    BootstrapPreviewRequest:
      type: object
      properties:
        bootstrap_json:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: false
      required:
      - bootstrap_json
    BootstrapConfirmRequest:
      type: object
      properties:
        confirmation_text:
          type: string
          description: Exact latest user confirmation, e.g. подтверждаю / ок / сохраняй
            / запускай / начинаем.
      additionalProperties: false
      required:
      - confirmation_text
    TurnRequest:
      type: object
      properties:
        player_input:
          type: string
          minLength: 1
          description: Exact latest user/player input. Must not be empty. Use '(начать
            первую сцену)' only after bootstrap confirmation.
        mode:
          type: string
          enum:
          - gpt_actions
          - debug_stub
          default: gpt_actions
      additionalProperties: false
      required:
      - player_input
    TurnPromptChunkResponse:
      type: object
      properties:
        session_id:
          type: string
        turn_id:
          type: string
        chunk_index:
          type: integer
        chunk_count:
          type: integer
        scene_prompt_chunk:
          type: string
        has_more:
          type: boolean
        next_chunk_index:
          type:
          - integer
          - 'null'
        diagnostics:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: false
      required:
      - session_id
      - turn_id
      - chunk_index
      - chunk_count
      - scene_prompt_chunk
      - has_more
    ApplyTurnResultRequest:
      type: object
      properties:
        turn_id:
          type:
          - string
          - 'null'
          description: The turn_id returned by processTurn. Preferred top-level field.
            Backend can also bind to the single pending turn after player_input check.
        scene_response: &id001
          type: object
          properties:
            response_version:
              type: string
              default: novella.scene_response.v1
            player_input:
              type: string
            rendered_text:
              type: string
              description: Compatibility fallback. Full visible scene text if scene.rendered_text
                is missing.
            scene:
              type: object
              properties:
                header:
                  type: object
                  properties: {}
                  additionalProperties: true
                body:
                  type: string
                  description: Full prose body. If short, backend extracts it from
                    rendered_text.
                player_options:
                  type: object
                  properties: {}
                  additionalProperties: true
                status_panel:
                  type: object
                  properties: {}
                  additionalProperties: true
                relationships_panel:
                  type: array
                  items:
                    type: object
                    properties: {}
                    additionalProperties: true
                rendered_text:
                  type: string
                  description: Full visible scene with header, body, options, status
                    and relationships.
              additionalProperties: true
            summary:
              type: string
            important_facts:
              type: array
              items:
                type: string
            witnesses:
              type: array
              items:
                type: object
                properties: {}
                additionalProperties: true
            proposed_updates:
              type: object
              properties: {}
              additionalProperties: true
            safety_checks:
              type: object
              properties:
                used_only_loaded_characters:
                  type: boolean
                respected_knowledge_boundaries:
                  type: boolean
                no_hidden_future_reveal:
                  type: boolean
                no_major_player_character_choice:
                  type: boolean
                respected_player_input_order:
                  type: boolean
                showed_only_scene_relationships:
                  type: boolean
                header_has_no_focus_or_active_list:
                  type: boolean
                notes:
                  type: array
                  items:
                    type: string
              additionalProperties: true
            metadata:
              type: object
              properties:
                turn_id:
                  type:
                  - string
                  - 'null'
              additionalProperties: true
          additionalProperties: true
        rendered_text:
          type:
          - string
          - 'null'
          description: Compatibility fallback if old Action puts visible scene text
            at top level.
        proposed_updates:
          type: object
          properties: {}
          additionalProperties: true
        safety_checks:
          type: object
          properties: {}
          additionalProperties: true
        metadata:
          type: object
          properties:
            turn_id:
              type:
              - string
              - 'null'
          additionalProperties: true
      additionalProperties: true
      required:
      - scene_response
    SceneResponse: *id001
paths:
  /health:
    get:
      operationId: health
      summary: Check API health.
      security: []
      responses:
        '200': &id002
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/start-questionnaire:
    get:
      operationId: getStartQuestionnaire
      summary: Get the visible start questionnaire when the user gave too little setup.
      responses:
        '200': *id002
  /api/v1/sessions:
    post:
      operationId: createSession
      summary: Create a new generated novella session or return questionnaire if setup
        is too small.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200': *id002
  /api/v1/sessions/{session_id}:
    get:
      operationId: getSession
      summary: Get one session status by session_id.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200': *id002
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-preview:
    post:
      operationId: createBootstrapPreview
      summary: Validate and save pending bootstrap JSON as a user-visible preview.
        Do not start the scene yet.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapPreviewRequest'
      responses:
        '200': *id002
        '422':
          description: Invalid bootstrap JSON
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/bootstrap-confirm:
    post:
      operationId: confirmBootstrapPreview
      summary: Commit pending bootstrap after explicit user confirmation.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapConfirmRequest'
      responses:
        '200': *id002
        '409':
          description: Preview not confirmed or wrong session status
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/turn:
    post:
      operationId: processTurn
      summary: Build compact scene prompt for one player turn. Returns turn_id; applyTurnResult
        must use it.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnRequest'
      responses:
        '200': *id002
        '409':
          description: Session not active
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Empty input
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/turn-prompt-chunk:
    get:
      operationId: getTurnPromptChunk
      summary: Get one stored scene_prompt chunk for the pending turn when processTurn
        says prompt_chunk_count > 1.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - name: turn_id
        in: query
        required: true
        schema:
          type: string
        description: turn_id returned by processTurn.
      - name: chunk_index
        in: query
        required: true
        schema:
          type: integer
          minimum: 0
        description: Zero-based chunk index. Start at 1 if processTurn already returned
          chunk 0.
      responses:
        '200':
          description: Prompt chunk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnPromptChunkResponse'
        '409':
          description: Missing/stale pending turn
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '416':
          description: Chunk index out of range
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /api/v1/sessions/{session_id}/apply-turn-result:
    post:
      operationId: applyTurnResult
      summary: Validate and save scene_response. Final assistant answer must be response.message_to_user.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyTurnResultRequest'
      responses:
        '200': *id002
        '409':
          description: Missing, stale, duplicate or mismatched turn_id
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
        '422':
          description: Invalid scene_response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
